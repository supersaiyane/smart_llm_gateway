events {}

http {

    upstream gateway_cluster {
        server gateway:8081;
    }

    server {
        listen 80;

        location /generate {
            proxy_pass http://gateway_cluster;

            proxy_connect_timeout 5s;
            proxy_read_timeout 60s;

            proxy_next_upstream error timeout http_500 http_502 http_503;
        }
    }
}