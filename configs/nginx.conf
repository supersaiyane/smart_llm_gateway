events {
    worker_connections 1024;
}

http {

    # ----------------------------------------------------------------
    # Gateway upstream
    # Add more server lines here when scaling gateway horizontally:
    #   server gateway2:8081;
    # ----------------------------------------------------------------
    upstream gateway_cluster {
        server gateway:8081;
        keepalive 32;           # reuse connections to the gateway
    }

    # ----------------------------------------------------------------
    # Common proxy headers — forwarded to the gateway on every request
    # ----------------------------------------------------------------
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Connection "";     # enable keepalive to upstream

    server {
        listen 80;

        # Max request body (generous for prompt payloads)
        client_max_body_size 10m;

        # ----------------------------------------------------------------
        # Inference endpoint
        #
        # proxy_next_upstream is intentionally NOT set here.
        # Retrying a POST /generate would send the same prompt to Ollama
        # a second time — double inference. The gateway's own circuit
        # breaker and fallback chain handle retry logic correctly.
        # ----------------------------------------------------------------
        location /generate {
            proxy_pass            http://gateway_cluster;
            proxy_connect_timeout 5s;
            proxy_read_timeout    90s;      # headroom for slow models
            proxy_send_timeout    10s;
        }

        # ----------------------------------------------------------------
        # Admin + observability endpoints (fast, short timeout)
        # ----------------------------------------------------------------
        location ~ ^/(health|status|nodes|metrics|config) {
            proxy_pass          http://gateway_cluster;
            proxy_read_timeout  10s;
        }

        # ----------------------------------------------------------------
        # Catch-all — forward everything else (e.g. /docs, /openapi.json)
        # ----------------------------------------------------------------
        location / {
            proxy_pass          http://gateway_cluster;
            proxy_read_timeout  30s;
        }
    }
}
